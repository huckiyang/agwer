name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: create venv
        run: uv venv --python ${{ matrix.python-version }}
      - name: install package + test deps
        run: uv pip install -e . pytest
      - name: run tests (no project re-sync)
        run: uv run --no-sync pytest --pyargs agwer -q

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: build sdist + wheel
        run: uv build
      - name: smoke-test installed wheel
        run: |
          uv venv --python 3.12 smokevenv
          VIRTUAL_ENV=smokevenv uv pip install dist/*.whl pytest
          smokevenv/bin/python -c "import agwer; o=agwer.evaluate(['a b'],['a b'],nbest=[['a x','a b']]); assert o.rir==1.0 and o.wer_compositional==0.0; print('wheel smoke OK', agwer.__version__)"
          smokevenv/bin/python -m pytest --pyargs agwer -q
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
