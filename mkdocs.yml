site_name: agwer
site_description: Agentic WER metrics for speech recognition and voice agents
repo_url: https://github.com/huckiyang/agwer
repo_name: huckiyang/agwer
theme:
  name: material
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle: { icon: material/brightness-7, name: dark mode }
    - scheme: slate
      primary: black
      accent: blue
      toggle: { icon: material/brightness-4, name: light mode }
  font: false          # system SF-style stack via extra.css
  features: [navigation.sections, navigation.tabs, content.code.copy]
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Usage: usage.md
  - CLI: cli.md
markdown_extensions: [admonition, pymdownx.superfences, tables]
